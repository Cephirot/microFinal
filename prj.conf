# ── Bluetooth ──────────────────────────────
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="BeatboxMaker"
CONFIG_BT_MAX_CONN=1

# Nordic UART Service
CONFIG_BT_NUS=y

# ── ADC (SAADC) ────────────────────────────
CONFIG_ADC=y

# ── QDEC (하드웨어 로터리 인코더 디코더) ──
CONFIG_QDEC_NRFX=y
CONFIG_SENSOR=y

# ── GPIO ──────────────────────────────────
CONFIG_GPIO=y

# ── 스레드 스택 ────────────────────────────
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# ── 타이머 해상도 (1ms ticks — 디바운스용) ─
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000

# ── 로깅 ──────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3