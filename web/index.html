<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BeatboxMaker</title>
<style>
  :root {
    --bg: #0d0d0d; --surface: #1a1a1a; --border: #2a2a2a;
    --green: #00e676; --text: #e0e0e0; --muted: #555;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace;
         min-height: 100vh; display: flex; flex-direction: column; }

  header { padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between;
           border-bottom: 1px solid var(--border); }
  header h1 { font-size: 1.1rem; letter-spacing: 0.15em; color: var(--green); }

  #bleBtn { padding: 0.4rem 1rem; background: transparent; border: 1px solid var(--green);
            color: var(--green); border-radius: 4px; cursor: pointer; font-family: inherit;
            font-size: 0.8rem; letter-spacing: 0.05em; transition: all 0.15s; }
  #bleBtn:hover { background: var(--green); color: #000; }
  #bleBtn.connected { border-color: #aaa; color: #aaa; }

  main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
         padding: 1rem; max-width: 900px; width: 100%; margin: 0 auto; }

  section { background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 1rem; }
  section h2 { font-size: 0.75rem; letter-spacing: 0.1em; color: var(--muted);
               margin-bottom: 0.8rem; text-transform: uppercase; }

  /* 볼륨 */
  .vol-bar { display: flex; align-items: center; gap: 0.8rem; }
  .vol-num { font-size: 2rem; font-weight: 700; color: var(--green); min-width: 3.5rem; }
  input[type=range] { flex: 1; accent-color: var(--green); }

  /* 사운드 라이브러리 */
  .sound-list { display: flex; flex-direction: column; gap: 4px; }
  .sound-item { display: flex; align-items: center; gap: 0.7rem; padding: 0.55rem 0.7rem;
                border-radius: 6px; cursor: pointer; transition: all 0.1s; border: 1px solid transparent; }
  .sound-item:hover { background: #222; }
  .sound-item.selected { background: #1e2e1e; border-color: var(--green); color: var(--green); }
  .sound-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .sound-name { font-size: 0.9rem; min-width: 70px; }
  .sound-gain-wrap { flex: 1; display: flex; align-items: center; gap: 6px; margin: 0 8px; }
  .sound-gain-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .sound-gain-fill { height: 100%; border-radius: 2px; transition: width 0.15s; }
  .sound-gain-pct { font-size: 0.65rem; color: var(--muted); min-width: 28px; text-align: right; }
  .sound-item.selected .sound-gain-pct { color: var(--green); }
  .sound-preview { font-size: 0.75rem; color: var(--muted); flex-shrink: 0;
                   padding: 2px 8px; border: 1px solid var(--border); border-radius: 3px; }
  .sound-preview:hover { border-color: var(--green); color: var(--green); }

  /* 슬롯 */
  .slots-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
  .slot-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
               padding: 0.8rem; min-height: 80px; cursor: pointer; transition: all 0.15s;
               display: flex; flex-direction: column; gap: 0.3rem; }
  .slot-card:hover { border-color: #444; }
  .slot-card.filled { border-color: var(--green); }
  .slot-card.playing { background: #1e2e1e; }
  .slot-num { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; }
  .slot-sound { font-size: 0.95rem; color: var(--text); }
  .slot-empty { font-size: 0.8rem; color: var(--muted); }
  .slot-led { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); margin-left: auto; }
  .slot-led.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .slot-header { display: flex; align-items: center; }
  .slot-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }

  /* 로그 */
  #log { grid-column: 1 / -1; max-height: 120px; overflow-y: auto; }
  #logContent { font-size: 0.72rem; color: var(--muted); line-height: 1.6; }

  @media (max-width: 600px) {
    main { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>BEATBOX MAKER</h1>
  <button id="bleBtn" onclick="toggleBLE()">BLE 연결</button>
</header>

<main>
  <!-- 볼륨 -->
  <section>
    <h2>볼륨</h2>
    <div class="vol-bar">
      <div class="vol-num" id="volNum">50%</div>
      <input type="range" id="volSlider" min="0" max="100" value="50"
             oninput="setVolume(this.value)">
      <div id="volSrc" style="font-size:0.7rem;color:var(--muted);min-width:3rem">수동</div>
    </div>
  </section>

  <!-- 사운드 라이브러리 -->
  <section>
    <h2>사운드 라이브러리</h2>
    <div class="sound-list" id="soundList"></div>
  </section>

  <!-- 슬롯 -->
  <section style="grid-column: 1 / -1">
    <h2>슬롯 (nRF 버튼으로 배정)</h2>
    <div class="slots-grid" id="slotsGrid"></div>
  </section>

  <!-- 로그 -->
  <section id="log">
    <h2>로그</h2>
    <div id="logContent"></div>
  </section>
</main>

<script>
/* ── Web Audio ─────────────────────────── */
let audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function masterGain(individualGain) {
  const g = getCtx().createGain();
  g.gain.value = (volume / 100) * (individualGain !== undefined ? individualGain : 1.0);
  g.connect(getCtx().destination);
  return g;
}

/* 킥 */
function synthKick(g=1) {
  const ctx = getCtx(); const now = ctx.currentTime;
  const osc = ctx.createOscillator(); const gain = ctx.createGain();
  osc.connect(gain); gain.connect(masterGain(g));
  osc.frequency.setValueAtTime(160, now);
  osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.5);
  gain.gain.setValueAtTime(1, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
  osc.start(now); osc.stop(now + 0.5);
}

/* 스네어 */
function synthSnare(g=1) {
  const ctx = getCtx(); const now = ctx.currentTime;
  const len = ctx.sampleRate * 0.2;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const noise = ctx.createBufferSource(); noise.buffer = buf;
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass'; filter.frequency.value = 3000;
  noise.connect(filter);
  const gain = ctx.createGain(); filter.connect(gain); gain.connect(masterGain(g));
  gain.gain.setValueAtTime(0.8, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
  noise.start(now); noise.stop(now + 0.2);
}

/* 하이햇 (닫힘) */
function synthHihat(g=1) {
  const ctx = getCtx(); const now = ctx.currentTime;
  const len = ctx.sampleRate * 0.08;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const noise = ctx.createBufferSource(); noise.buffer = buf;
  const filter = ctx.createBiquadFilter();
  filter.type = 'highpass'; filter.frequency.value = 9000;
  noise.connect(filter);
  const gain = ctx.createGain(); filter.connect(gain); gain.connect(masterGain(g));
  gain.gain.setValueAtTime(0.4, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
  noise.start(now); noise.stop(now + 0.08);
}

/* 하이햇 (열림) */
function synthOpenHat(g=1) {
  const ctx = getCtx(); const now = ctx.currentTime;
  const len = ctx.sampleRate * 0.4;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const noise = ctx.createBufferSource(); noise.buffer = buf;
  const filter = ctx.createBiquadFilter();
  filter.type = 'highpass'; filter.frequency.value = 8000;
  noise.connect(filter);
  const gain = ctx.createGain(); filter.connect(gain); gain.connect(masterGain(g));
  gain.gain.setValueAtTime(0.35, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
  noise.start(now); noise.stop(now + 0.4);
}

/* 베이스 */
function synthBass(g=1) {
  const ctx = getCtx(); const now = ctx.currentTime;
  const osc = ctx.createOscillator(); const gain = ctx.createGain();
  osc.type = 'sawtooth'; osc.frequency.value = 80;
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass'; filter.frequency.value = 400;
  osc.connect(filter); filter.connect(gain); gain.connect(masterGain(g));
  gain.gain.setValueAtTime(0.8, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
  osc.start(now); osc.stop(now + 0.4);
}

/* 클랩 */
function synthClap(g=1) {
  const ctx = getCtx(); const now = ctx.currentTime;
  for (let t = 0; t < 3; t++) {
    const len = ctx.sampleRate * 0.03;
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const noise = ctx.createBufferSource(); noise.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass'; filter.frequency.value = 1200;
    noise.connect(filter);
    const gain = ctx.createGain(); filter.connect(gain); gain.connect(masterGain(g));
    const delay = t * 0.012;
    gain.gain.setValueAtTime(0.6, now + delay);
    gain.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.08);
    noise.start(now + delay); noise.stop(now + delay + 0.08);
  }
}

/* 톰 */
function synthTom(g=1) {
  const ctx = getCtx(); const now = ctx.currentTime;
  const osc = ctx.createOscillator(); const gain = ctx.createGain();
  osc.frequency.setValueAtTime(200, now);
  osc.frequency.exponentialRampToValueAtTime(60, now + 0.3);
  osc.connect(gain); gain.connect(masterGain(g));
  gain.gain.setValueAtTime(0.8, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
  osc.start(now); osc.stop(now + 0.3);
}

/* 신스 멜로디 */
function synthMelody(g=1) {
  const ctx = getCtx(); const now = ctx.currentTime;
  const osc = ctx.createOscillator(); const gain = ctx.createGain();
  osc.type = 'square'; osc.frequency.value = 440;
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass'; filter.frequency.value = 800;
  osc.connect(filter); filter.connect(gain); gain.connect(masterGain(g));
  gain.gain.setValueAtTime(0.3, now);
  gain.gain.setValueAtTime(0.3, now + 0.1);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
  osc.start(now); osc.stop(now + 0.5);
}

/* ── 사운드 목록 ──────────────────────── */
const sounds = [
  { name: 'Kick',     color: '#e74c3c', fn: synthKick,     gain: 1.0 },
  { name: 'Snare',    color: '#e67e22', fn: synthSnare,    gain: 1.0 },
  { name: 'Hi-Hat',   color: '#f1c40f', fn: synthHihat,   gain: 1.0 },
  { name: 'Open Hat', color: '#2ecc71', fn: synthOpenHat,  gain: 1.0 },
  { name: 'Bass',     color: '#3498db', fn: synthBass,     gain: 1.0 },
  { name: 'Clap',     color: '#9b59b6', fn: synthClap,     gain: 1.0 },
  { name: 'Tom',      color: '#1abc9c', fn: synthTom,      gain: 1.0 },
  { name: 'Synth',    color: '#e91e63', fn: synthMelody,   gain: 1.0 },
];

const slots = [null, null, null, null];
let selectedIdx = 0;
let volume = 50;

/* ── 루프 프리뷰 ──────────────────────── */
let previewTimer = null;
const PREVIEW_INTERVAL = 600; /* ms */

function startPreview(idx) {
  stopPreview();
  const play = () => { sounds[idx].fn(sounds[idx].gain); };
  play();
  previewTimer = setInterval(play, PREVIEW_INTERVAL);
}
function stopPreview() {
  if (previewTimer) { clearInterval(previewTimer); previewTimer = null; }
}

/* ── 렌더링 ───────────────────────────── */
function renderSounds() {
  const list = document.getElementById('soundList');
  list.innerHTML = '';
  sounds.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'sound-item' + (i === selectedIdx ? ' selected' : '');
    const pct = Math.round(s.gain * 100);
    const barW = Math.min(100, Math.round((s.gain / 2.0) * 100));
    div.innerHTML = `
      <div class="sound-dot" style="background:${s.color}"></div>
      <span class="sound-name">${s.name}</span>
      <div class="sound-gain-wrap">
        <div class="sound-gain-bar">
          <div class="sound-gain-fill" style="width:${barW}%;background:${s.color}88"></div>
        </div>
        <span class="sound-gain-pct">${pct}%</span>
      </div>
      <span class="sound-preview" onclick="previewSound(event,${i})">▶</span>`;
    div.onclick = (e) => { if (!e.target.classList.contains('sound-preview')) selectSound(i); };
    list.appendChild(div);
  });
}

function renderSlots() {
  const grid = document.getElementById('slotsGrid');
  grid.innerHTML = '';
  slots.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'slot-card' + (s ? ' filled' : '');
    div.id = `slot${i}`;
    div.innerHTML = `
      <div class="slot-header">
        <span class="slot-num">SLOT ${i+1}</span>
        <div class="slot-led" id="led${i}"></div>
      </div>
      ${s ? `<div class="slot-dot" style="background:${sounds.find(x=>x.name===s.name)?.color||'#888'}"></div>
             <div class="slot-sound">${s.name}</div>` :
            `<div class="slot-empty">비어있음</div>`}`;
    if (s) div.onclick = () => playSlot(i);
    grid.appendChild(div);
  });
}

/* ── 동작 ─────────────────────────────── */
function selectSound(idx) {
  selectedIdx = ((idx % sounds.length) + sounds.length) % sounds.length;
  renderSounds();
  document.querySelectorAll('.sound-item')[selectedIdx]?.scrollIntoView({block:'nearest'});
  startPreview(selectedIdx);
  log(`선택: ${sounds[selectedIdx].name}`);
}

function previewSound(e, i) {
  e.stopPropagation();
  sounds[i].fn();
}

function assignSlot(slotIdx) {
  if (slotIdx < 0 || slotIdx > 3) return;
  slots[slotIdx] = { name: sounds[selectedIdx].name, fn: sounds[selectedIdx].fn, gain: sounds[selectedIdx].gain };
  stopPreview();
  renderSlots();
  log(`슬롯 ${slotIdx+1} ← ${sounds[selectedIdx].name}`, 'ok');
}

function playSlot(i) {
  if (!slots[i]) return;
  stopPreview();
  slots[i].fn(slots[i].gain || 1);
  updateLED(i, true);
  sendBLE(`PLAY:${i+1}`);
  log(`재생: 슬롯 ${i+1} (${slots[i].name})`, 'ok');
  setTimeout(() => { updateLED(i, false); sendBLE(`STOP:${i+1}`); }, 500);
}

function updateLED(idx, on) {
  const led = document.getElementById(`led${idx}`);
  if (led) led.classList.toggle('on', on);
  const card = document.getElementById(`slot${idx}`);
  if (card) card.classList.toggle('playing', on);
}

function setVolume(val, source) {
  volume = parseInt(val);
  document.getElementById('volNum').textContent = volume + '%';
  document.getElementById('volSlider').value = volume;
  if (source) document.getElementById('volSrc').textContent = source;
}

/* ── BLE ──────────────────────────────── */
let ble = null, txChar = null;

async function toggleBLE() {
  if (ble) { ble.gatt.disconnect(); return; }
  try {
    const dev = await navigator.bluetooth.requestDevice({
      filters: [{ name: 'BeatboxMaker' }],
      optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e']
    });
    const server = await dev.gatt.connect();
    const svc = await server.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
    txChar = await svc.getCharacteristic('6e400002-b5a3-f393-e0a9-e50e24dcca9e');
    const rxChar = await svc.getCharacteristic('6e400003-b5a3-f393-e0a9-e50e24dcca9e');
    await rxChar.startNotifications();
    rxChar.addEventListener('characteristicvaluechanged', onBLENotify);
    ble = dev;
    dev.addEventListener('gattserverdisconnected', onBLEDisconnect);
    document.getElementById('bleBtn').textContent = '연결됨';
    document.getElementById('bleBtn').classList.add('connected');
    log('BLE 연결됨', 'ok');
  } catch (e) { log('BLE 오류: ' + e.message, 'err'); }
}

function onBLEDisconnect() {
  ble = null; txChar = null;
  document.getElementById('bleBtn').textContent = 'BLE 연결';
  document.getElementById('bleBtn').classList.remove('connected');
  log('BLE 연결 해제');
}

function onBLENotify(e) {
  const val = new TextDecoder().decode(e.target.value);
  log('RX: ' + val);
  if (val.startsWith('VOL:')) {
    setVolume(parseInt(val.split(':')[1]), 'nRF');
  } else if (val === 'SEL:UP') {
    selectSound(selectedIdx - 1);
  } else if (val === 'SEL:DOWN') {
    selectSound(selectedIdx + 1);
  } else if (val === 'GAIN:UP') {
    sounds[selectedIdx].gain = Math.min(2.0, +(sounds[selectedIdx].gain + 0.1).toFixed(1));
    renderSounds();
    log(`${sounds[selectedIdx].name} 볼륨: ${Math.round(sounds[selectedIdx].gain * 100)}%`);
  } else if (val === 'GAIN:DOWN') {
    sounds[selectedIdx].gain = Math.max(0.1, +(sounds[selectedIdx].gain - 0.1).toFixed(1));
    renderSounds();
    log(`${sounds[selectedIdx].name} 볼륨: ${Math.round(sounds[selectedIdx].gain * 100)}%`);
  } else if (val.startsWith('SLOT:')) {
    const idx = parseInt(val.split(':')[1]) - 1;
    if (slots[idx]) playSlot(idx);
    else assignSlot(idx);
  } else if (val.startsWith('CLR:')) {
    const idx = parseInt(val.split(':')[1]) - 1;
    slots[idx] = null;
    renderSlots();
    log(`슬롯 ${idx+1} 초기화`);
  } else if (val.startsWith('LED:')) {
    const parts = val.split(':');
    updateLED(parseInt(parts[1]) - 1, parts[2] === '1');
  }
}

function sendBLE(msg) {
  if (!txChar) return;
  txChar.writeValue(new TextEncoder().encode(msg)).catch(() => {});
}

/* ── 로그 ─────────────────────────────── */
function log(msg, type) {
  const el = document.getElementById('logContent');
  const line = document.createElement('div');
  line.style.color = type === 'ok' ? 'var(--green)' : type === 'err' ? '#e74c3c' : 'var(--muted)';
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
  if (el.children.length > 50) el.removeChild(el.firstChild);
}

/* ── 키보드 ───────────────────────────── */
document.addEventListener('keydown', e => {
  if (['1','2','3','4'].includes(e.key)) playSlot(parseInt(e.key) - 1);
  if (e.key === 'ArrowUp')   selectSound(selectedIdx - 1);
  if (e.key === 'ArrowDown') selectSound(selectedIdx + 1);
});

/* ── 초기화 ───────────────────────────── */
renderSounds();
renderSlots();
</script>
</body>
</html>
